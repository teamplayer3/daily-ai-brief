name: Daily AI Brief

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * *"
      timezone: "Europe/Berlin"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ai-brief-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate site
        run: python -m ai_news_brief --output-dir site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
